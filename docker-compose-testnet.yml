name: grin

services:
  grin-telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: grin-telegram-bot
    container_name: grin-telegram-bot-container
    command: ["./start.sh"]
    environment:
      RUST_BACKTRACE: "1"
      GRIN_CHAIN_TYPE: "testnet"
      DATA_DIR: "/opt/grin-telegram-bot/data"
    ports:
      - "13415:13415"
      - "13420:13420"
      - "88:88"
    volumes:
      - /home/grin/grin-telegram-bot-data:/opt/grin-telegram-bot/data
    networks:
      - grin-network
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    stdin_open: true
    tty: true
    restart: "no"

networks:
  grin-network:
    name: grin_network